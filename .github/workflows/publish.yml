name: Publish Packages

on:
  push:
    tags:
      - "by-framework-v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version from tag
        id: extract
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#by-framework-v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: extract-version
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Verify tag version matches pom.xml
        env:
          EXPECTED_VERSION: ${{ needs.extract-version.outputs.version }}
        run: |
          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          if [ "$POM_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "Tag version ${EXPECTED_VERSION} does not match pom.xml version ${POM_VERSION}"
            exit 1
          fi

      - name: Build and test
        run: mvn -B clean verify

      - name: Stage to Maven Central
        run: mvn -B deploy -P release
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_GPG_KEY: ${{ secrets.MAVEN_GPG_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  post-release:
    runs-on: ubuntu-latest
    needs:
      - extract-version
      - build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Create release branch
        env:
          VERSION: ${{ needs.extract-version.outputs.version }}
        run: |
          RELEASE_BRANCH="release/by-framework/v${VERSION}"
          git checkout -b "$RELEASE_BRANCH"
          git push origin "$RELEASE_BRANCH"

      - name: Bump version and create PR
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.extract-version.outputs.version }}
        run: |
          # Calculate next snapshot version (e.g., 0.2.8 -> 0.2.9-SNAPSHOT)
          IFS='.' read -ra PARTS <<< "$VERSION"
          LAST_INDEX=$((${#PARTS[@]} - 1))
          PARTS[$LAST_INDEX]=$((PARTS[$LAST_INDEX] + 1))
          NEXT_VERSION=$(IFS='.'; echo "${PARTS[*]}")-SNAPSHOT

          mvn versions:set -DnewVersion="${NEXT_VERSION}" -DgenerateBackupPoms=false

          BUMP_BRANCH="bump/by-framework/v${NEXT_VERSION}"
          git checkout -b "$BUMP_BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "**/pom.xml"
          git commit -m "chore: bump by-framework version to ${NEXT_VERSION}"
          git push origin "$BUMP_BRANCH"

          gh pr create \
            --title "chore: bump by-framework to ${NEXT_VERSION}" \
            --body "Auto-bump version after by-framework v${VERSION} release." \
            --base main \
            --head "$BUMP_BRANCH"
